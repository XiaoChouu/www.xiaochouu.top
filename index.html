    <style>
        .toast {

            bottom: 20px;

            padding: 12px 24px;

            z-index: 1001;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .toast.show {
            opacity: 1;
        }
        
        #videoModal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 1000;

</head>

               class="flex items-center gap-2 text-primary no-underline py-2 px-4 rounded-full border border-gray-300 bg-primary/5 text-sm hover:bg-primary/10 hover:-translate-y-1 transition-all" 
               target="_blank">

            <a href="https://space.bilibili.com/3546577484384557"

            </a>
            <a href="https://qm.qq.com/cgi-bin/qm/qr?k=GLQ0NkMNU9fpRlbOFUC4NaWIE0cij9c6"

    <!-- 联系方式区域 -->

        </div>
    </div>

    <!-- 跳转按钮 -->
    <div class="text-center my-8">
        <a href="https://eggyparty.xiaochouu.top" class="bg-eggRed text-white py-3 px-7 rounded-full text-lg no-underline hover:bg-[#FF8E8E] transition-colors">
            <i class="fas fa-external-link-alt"></i> 访问蛋仔派对赛季视频视频库
        </a>
    </div>

    <!-- 视频下载区域 -->
    <section class="max-w-7xl mx-auto px-5 my-8">
        <h2 class="text-center text-eggYellow text-xl mb-6">蛋仔派对赛季视频下载</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="seasonContainer"></div>
    </section>

    <!-- 视频预览模态框 -->
    <div id="videoModal" class="fixed inset-0 bg-black bg-opacity-75 flex items-center justify-center z-50 hidden">
        <div class="bg-white rounded-lg overflow-hidden w-full max-w-4xl">
            <div class="flex justify-between items-center bg-eggYellow p-4">
                <h3 id="modalTitle" class="text-lg font-medium"></h3>
                <button onclick="closeVideoModal()" class="text-gray-700 hover:text-gray-900">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="p-4">
                <video id="modalVideo" controls class="w-full"></video>
            </div>
        </div>
    </div>

    <!-- 提示信息 -->
    <div id="toast" class="toast"></div>

    <footer class="text-center py-6 text-lightText text-xs">
        <a href="#" class="no-underline hover:underline">主站：www.xiaochouu.top</a> | 
        <a href="https://eggyparty.xiaochouu.top" class="no-underline hover:underline">蛋仔派对赛季视频下载：eggyparty.xiaochouu.top</a>
    </footer>

    <script>
        // 显示提示
        function showToast(message, duration = 3000) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), duration);
        }

        // 视频预览功能
        function previewVideo(seasonNum) {
            const videoUrl = `https://www.xiaochouu.top/s${seasonNum}eggyparty.mp4`;
            const modal = document.getElementById('videoModal');
            const video = document.getElementById('modalVideo');
            
            showToast('正在加载视频...');
            modal.classList.remove('hidden');
            video.src = videoUrl;
            
            video.onloadeddata = () => {
                showToast('视频加载完成');
                video.play();
            };
            
            video.onerror = () => {
                showToast('视频加载失败');
                closeVideoModal();
            };
        }

        function closeVideoModal() {
            document.getElementById('videoModal').classList.add('hidden');
            const video = document.getElementById('modalVideo');
            video.pause();
            video.src = '';
        }

        // 改进的下载函数
        function downloadVideo(url, filename) {
            showToast('正在准备下载...');
            
            // 方法1: 尝试直接下载
            const link = document.createElement('a');
            link.href = url;
            link.download = filename;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            
            // 方法2: 如果方法1失败，3秒后在新窗口打开
            setTimeout(() => {
                if(!document.querySelector('a[download]')) {
                    showToast('正在新窗口打开视频，请右键另存为');
                    window.open(url, '_blank');
                }
            }, 3000);
        }

        // 生成赛季卡片
        function generateSeasonCards() {
            const container = document.getElementById('seasonContainer');
            
            for(let i = 1; i <= 23; i++) {
                const videoUrl = `https://www.xiaochouu.top/s${i}eggyparty.mp4`;
                const imageUrl = `https://www.xiaochouu.top/images/s${i}.png`;
                const filename = `蛋仔派对_S${i}赛季视频.mp4`;
                
                const card = `
                    <div class="bg-white rounded-xl overflow-hidden shadow-md hover:-translate-y-2 transition-transform">
                        <img src="${imageUrl}" 
                             alt="S${i}赛季" 
                             class="w-full h-40 object-cover border-b-4 border-eggYellow">
                        <div class="p-4">
                            <h3 class="text-base text-gray-800 mb-2">S${i}</h3>
                            <div class="flex gap-2">
                                <button onclick="previewVideo(${i})" 
                                        class="flex-1 bg-eggYellow hover:bg-[#FFE08E] text-white py-2 px-3 rounded-full transition-colors">
                                    <i class="fas fa-play"></i> 预览
                                </button>
                                <button onclick="downloadVideo('${videoUrl}', '${filename}')" 
                                        class="flex-1 bg-eggYellow hover:bg-[#FFE08E] text-white py-2 px-3 rounded-full transition-colors">
                                    <i class="fas fa-download"></i> 下载
                                </button>
                            </div>
                        </div>
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', card);
            }
        }

        // 初始化
        window.addEventListener('DOMContentLoaded', generateSeasonCards);
    </script>
</body>
</html>
